name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v2.13.5)'
        required: true
        default: 'v2.13.5'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.2
      
      - name: Install
        run: bun install
      
      - name: Build Linux x64
        run: |
          mkdir -p dist/sahyacode-linux-x64/bin
          cd packages/sahyacode
          bun build --compile --target=bun-linux-x64 ./src/index.ts --outfile ../../dist/sahyacode-linux-x64/bin/sahyacode
      
      - name: Build Linux ARM64
        run: |
          mkdir -p dist/sahyacode-linux-arm64/bin
          cd packages/sahyacode
          bun build --compile --target=bun-linux-arm64 ./src/index.ts --outfile ../../dist/sahyacode-linux-arm64/bin/sahyacode
      
      - name: Package
        run: |
          cd dist
          tar -czf sahyacode-linux-x64.tar.gz sahyacode-linux-x64/bin/sahyacode
          tar -czf sahyacode-linux-arm64.tar.gz sahyacode-linux-arm64/bin/sahyacode
          ls -la *.tar.gz
      
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: dist/*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.2
      
      - name: Install
        run: bun install
      
      - name: Build macOS ARM64
        run: |
          mkdir -p dist/sahyacode-darwin-arm64/bin
          cd packages/sahyacode
          bun build --compile --target=bun-darwin-arm64 ./src/index.ts --outfile ../../dist/sahyacode-darwin-arm64/bin/sahyacode
      
      - name: Build macOS x64
        run: |
          mkdir -p dist/sahyacode-darwin-x64/bin
          cd packages/sahyacode
          bun build --compile --target=bun-darwin-x64 ./src/index.ts --outfile ../../dist/sahyacode-darwin-x64/bin/sahyacode
      
      - name: Package
        run: |
          cd dist
          zip -r sahyacode-darwin-arm64.zip sahyacode-darwin-arm64/bin/sahyacode
          zip -r sahyacode-darwin-x64.zip sahyacode-darwin-x64/bin/sahyacode
          ls -la *.zip
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: dist/*.zip

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: '*-binaries'
          merge-multiple: true
      
      - name: List files
        run: ls -la binaries/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: SahyaCode ${{ github.event.inputs.version }}
          files: binaries/**
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
