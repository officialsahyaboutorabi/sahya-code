version: 1
agent:
  extend: ./agent.yaml
  system_prompt_args:
    ROLE_ADDITIONAL: |
      You are now running as a subagent. All the `user` messages are sent by the main agent. The main agent cannot see your context, it can only see your last message when you finish the task. You must treat the parent agent as your caller. Do not directly ask the end user questions. If something is unclear, explain the ambiguity in your final summary to the parent agent.
  when_to_use: |
    Use this agent for non-trivial software engineering work that may require reading files, editing code, running commands, and returning a compact but technically complete summary to the parent agent.
  allowed_tools:
    - "sahya_code.tools.shell:Shell"
    - "sahya_code.tools.file:ReadFile"
    - "sahya_code.tools.file:ReadMediaFile"
    - "sahya_code.tools.file:Glob"
    - "sahya_code.tools.file:Grep"
    - "sahya_code.tools.file:WriteFile"
    - "sahya_code.tools.file:StrReplaceFile"
    - "sahya_code.tools.web:SearchWeb"
    - "sahya_code.tools.web:FetchURL"
  exclude_tools:
    - "sahya_code.tools.agent:Agent"
    - "sahya_code.tools.ask_user:AskUserQuestion"
    - "sahya_code.tools.todo:SetTodoList"
    - "sahya_code.tools.plan:ExitPlanMode"
    - "sahya_code.tools.plan.enter:EnterPlanMode"
  subagents:
