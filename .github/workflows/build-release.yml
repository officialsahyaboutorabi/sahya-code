name: Build and Release SahyaCode

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            # Strip 'v' prefix if present for consistency
            VERSION="${VERSION#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          else
            TAG=${GITHUB_REF#refs/tags/}
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi
          echo "Building version: $VERSION"

  build-cli:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Build all targets
        id: build
        run: |
          cd packages/opencode
          bun ./script/build.ts
        env:
          SAHYACODE_VERSION: ${{ needs.version.outputs.version }}
          SAHYACODE_CHANNEL: "release"
      
      - name: Upload Linux ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-linux-arm64
          path: packages/opencode/dist/sahyacode-linux-arm64*
      
      - name: Upload Linux x64 binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-linux-x64
          path: packages/opencode/dist/sahyacode-linux-x64*
      
      - name: Upload Linux ARM64 musl binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-linux-arm64-musl
          path: packages/opencode/dist/sahyacode-linux-arm64-musl*
      
      - name: Upload Linux x64 musl binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-linux-x64-musl
          path: packages/opencode/dist/sahyacode-linux-x64-musl*
      
      - name: Upload Linux x64 baseline binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-linux-x64-baseline
          path: packages/opencode/dist/sahyacode-linux-x64-baseline*
      
      - name: Upload Linux x64 musl baseline binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-linux-x64-musl-baseline
          path: packages/opencode/dist/sahyacode-linux-x64-musl-baseline*
      
      - name: Upload macOS ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-darwin-arm64
          path: packages/opencode/dist/sahyacode-darwin-arm64*
      
      - name: Upload macOS x64 binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-darwin-x64
          path: packages/opencode/dist/sahyacode-darwin-x64*
      
      - name: Upload macOS x64 baseline binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-darwin-x64-baseline
          path: packages/opencode/dist/sahyacode-darwin-x64-baseline*
      
      - name: Upload Windows x64 binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-windows-x64
          path: packages/opencode/dist/sahyacode-windows-x64*
      
      - name: Upload Windows ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-windows-arm64
          path: packages/opencode/dist/sahyacode-windows-arm64*
      
      - name: Upload Windows x64 baseline binary
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-windows-x64-baseline
          path: packages/opencode/dist/sahyacode-windows-x64-baseline*

  release:
    needs: [version, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
          pattern: sahyacode-*
          merge-multiple: true
      
      - name: List downloaded files
        run: |
          echo "Downloaded files:"
          find ./binaries -type f -ls
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./binaries/**
          tag_name: ${{ needs.version.outputs.tag }}
          name: SahyaCode ${{ needs.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
