name: Build and Release SahyaCode

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          else
            TAG=${GITHUB_REF#refs/tags/}
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi
          echo "Building version: $VERSION"

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Build Linux binaries
        run: |
          cd packages/sahyacode
          # Build all Linux targets
          for target in bun-linux-arm64 bun-linux-x64 bun-linux-x64-baseline bun-linux-arm64-musl bun-linux-x64-musl bun-linux-x64-musl-baseline; do
            echo "Building for $target..."
            name="sahyacode-${target#bun-}"
            mkdir -p "dist/$name/bin"
            
            bun build --compile --target="$target" ./src/index.ts --outfile "dist/$name/bin/sahyacode" 2>&1 || {
              echo "Failed to build $target"
              continue
            }
            
            # Create archive
            cd "dist/$name/bin"
            tar -czf "../../../$name.tar.gz" *
            cd ../../..
          done
          
          ls -la dist/
        env:
          SAHYACODE_VERSION: ${{ needs.version.outputs.version }}
      
      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-linux-binaries
          path: packages/sahyacode/dist/*.tar.gz

  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Build macOS binaries
        run: |
          cd packages/sahyacode
          # Build all macOS targets
          for target in bun-darwin-arm64 bun-darwin-x64 bun-darwin-x64-baseline; do
            echo "Building for $target..."
            name="sahyacode-${target#bun-}"
            mkdir -p "dist/$name/bin"
            
            bun build --compile --target="$target" ./src/index.ts --outfile "dist/$name/bin/sahyacode" 2>&1 || {
              echo "Failed to build $target"
              continue
            }
            
            # Create archive
            cd "dist/$name/bin"
            zip -r "../../../$name.zip" *
            cd ../../..
          done
          
          ls -la dist/
        env:
          SAHYACODE_VERSION: ${{ needs.version.outputs.version }}
      
      - name: Upload macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: sahyacode-macos-binaries
          path: packages/sahyacode/dist/*.zip

  release:
    needs: [version, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
          pattern: sahyacode-*-binaries
          merge-multiple: true
      
      - name: List downloaded files
        run: |
          echo "Downloaded files:"
          find ./binaries -type f -ls
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./binaries/**
          tag_name: ${{ needs.version.outputs.tag }}
          name: SahyaCode ${{ needs.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
