name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v2.13.5)'
        required: true
        default: 'v2.13.5'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.2
      
      - name: Install dependencies
        run: bun install
      
      - name: Build macOS ARM64 binary
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "Building version: $VERSION"
          mkdir -p dist/sahyacode-darwin-arm64/bin
          cd packages/sahyacode
          SAHYACODE_VERSION="$VERSION" SAHYACODE_CHANNEL="latest" bun build --compile --target=bun-darwin-arm64 ./src/index.ts --outfile ../../dist/sahyacode-darwin-arm64/bin/sahyacode
      
      - name: Test binary version
        run: |
          ./dist/sahyacode-darwin-arm64/bin/sahyacode --version
      
      - name: Package
        run: |
          cd dist
          zip -r sahyacode-darwin-arm64.zip sahyacode-darwin-arm64
          ls -la *.zip
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/sahyacode-darwin-arm64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.2
      
      - name: Install dependencies
        run: bun install
      
      - name: Build Linux x64 binary
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "Building version: $VERSION"
          mkdir -p dist/sahyacode-linux-x64/bin
          cd packages/sahyacode
          SAHYACODE_VERSION="$VERSION" SAHYACODE_CHANNEL="latest" bun build --compile --target=bun-linux-x64 ./src/index.ts --outfile ../../dist/sahyacode-linux-x64/bin/sahyacode
      
      - name: Test binary version
        run: |
          ./dist/sahyacode-linux-x64/bin/sahyacode --version
      
      - name: Package
        run: |
          cd dist
          tar -czf sahyacode-linux-x64.tar.gz sahyacode-linux-x64
          ls -la *.tar.gz
      
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: dist/sahyacode-linux-x64.tar.gz

  create-release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true
      
      - name: List binaries
        run: ls -la binaries/
      
      - name: Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: SahyaCode ${{ github.event.inputs.version }}
          files: binaries/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
