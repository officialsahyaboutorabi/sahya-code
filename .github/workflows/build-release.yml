name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v2.13.5)'
        required: true
        default: 'v2.13.5'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.2
      
      - name: Install root dependencies
        run: bun install
      
      - name: Build Linux x64 binary
        run: |
          mkdir -p dist/sahyacode-linux-x64/bin
          cd packages/sahyacode
          bun build --compile --target=bun-linux-x64 ./src/index.ts --outfile ../../dist/sahyacode-linux-x64/bin/sahyacode
      
      - name: Package Linux x64
        run: |
          cd dist/sahyacode-linux-x64/bin
          tar -czf ../../../sahyacode-linux-x64.tar.gz sahyacode
          cd ../../..
          ls -la *.tar.gz
      
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: sahyacode-linux-x64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.2
      
      - name: Install root dependencies  
        run: bun install
      
      - name: Build macOS ARM64 binary
        run: |
          mkdir -p dist/sahyacode-darwin-arm64/bin
          cd packages/sahyacode
          bun build --compile --target=bun-darwin-arm64 ./src/index.ts --outfile ../../dist/sahyacode-darwin-arm64/bin/sahyacode
      
      - name: Package macOS ARM64
        run: |
          cd dist/sahyacode-darwin-arm64/bin
          zip -r ../../../sahyacode-darwin-arm64.zip sahyacode
          cd ../../..
          ls -la *.zip
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: sahyacode-darwin-arm64.zip

  create-release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true
      
      - name: List binaries
        run: ls -la binaries/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: SahyaCode ${{ github.event.inputs.version }}
          files: binaries/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
